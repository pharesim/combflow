services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_logs:/var/log/caddy
      - goaccess_html:/var/www/goaccess:ro
    environment:
      CADDY_UI: ${CADDY_UI:-honeycomb.lvh.me}
      CADDY_API: ${CADDY_API:-combflow.lvh.me}
      CADDY_UI_OLD: ${CADDY_UI_OLD:-old.invalid}
    depends_on:
      combflow-app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  combflow-app:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             python alembic/verify_migration.py &&
             uvicorn project.api.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: /combflow
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_VERBOSITY: critical
      CADDY_UI: ${CADDY_UI:-honeycomb.lvh.me}
      CADDY_API: ${CADDY_API:-combflow.lvh.me}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hive_worker:
    build: .
    command: python -m project.worker.hive
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: /combflow
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_VERBOSITY: critical
      HOME: /tmp
    depends_on:
      db:
        condition: service_healthy
      combflow-app:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(stat -c %Y /tmp/worker_heartbeat 2>/dev/null || echo 0) )) -lt 300 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg17
    command: postgres -c max_connections=50 -c shared_buffers=256MB
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /tmp
      - /run/postgresql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prerender:
    build: ./prerender
    restart: unless-stopped
    shm_size: '256m'
    environment:
      CACHE_ROOT_DIR: /cache
    volumes:
      - prerender_cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  goaccess:
    image: allinurl/goaccess:1.9.3
    restart: unless-stopped
    entrypoint: /bin/sh
    command: ["/scripts/goaccess-run.sh"]
    volumes:
      - caddy_logs:/var/log/caddy:ro
      - goaccess_html:/var/www/goaccess
      - ./goaccess-run.sh:/scripts/goaccess-run.sh:ro
    depends_on:
      - caddy
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_logs:
  goaccess_html:
  prerender_cache:
